<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機抽籤工具</title>
    <style>
        /* --- CSS 樣式設定 --- */
        :root {
            --primary-color: #4a90e2;    /* 主色調：藍色 */
            --secondary-color: #e67e22;  /* 強調色：橘色 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主容器 */
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* 輸入區塊 */
        .input-group {
            margin: 1.5rem 0;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            resize: none;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.2);
        }

        /* 按鈕樣式 */
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        /* 結果顯示區 */
        .result-area {
            margin-top: 2rem;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 15px;
            border: 2px dashed var(--primary-color);
            position: relative;
            overflow: hidden;
        }

        #result-title {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        #winner-name {
            font-size: 32px;
            font-weight: 800;
            color: var(--secondary-color);
            min-height: 40px;
            display: block;
        }

        /* 跑馬燈動畫效果 */
        .rolling {
            animation: roll 0.1s infinite alternate;
            opacity: 0.7;
        }

        @keyframes roll {
            from { transform: scale(0.95); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 萬用抽籤器</h1>
        
        <div class="input-group">
            <label for="names-input">名單內容 (每一行代表一人)：</label>
            <textarea id="names-input" placeholder="請在此輸入名單...&#10;例如：&#10;小明&#10;小華&#10;阿強"></textarea>
        </div>

        <button id="draw-btn">即刻抽籤</button>

        <div class="result-area">
            <div id="result-title">恭喜中獎者</div>
            <span id="winner-name">？</span>
        </div>
    </div>

    <script>
        /* --- JavaScript 邏輯 --- */

        const drawBtn = document.getElementById('draw-btn');
        const namesInput = document.getElementById('names-input');
        const winnerName = document.getElementById('winner-name');
        const resultTitle = document.getElementById('result-title');

        drawBtn.addEventListener('click', function() {
            // 1. 取得名單並處理 (去空白、過濾空行)
            const rawText = namesInput.value;
            const names = rawText.split('\n')
                                .map(name => name.trim())
                                .filter(name => name !== "");

            // 2. 防錯處理：如果沒輸入名字
            if (names.length === 0) {
                winnerName.innerText = "請輸入名單";
                winnerName.style.color = "#e74c3c"; // 變成紅色提示
                return;
            }

            // 3. 恢復正常顏色
            winnerName.style.color = "var(--secondary-color)";
            resultTitle.innerText = "正在抽籤中...";

            // 4. 製作「滾動」視覺效果
            let count = 0;
            drawBtn.disabled = true; // 抽籤時禁用按鈕
            winnerName.classList.add('rolling');

            const timer = setInterval(() => {
                // 隨機從陣列抓一個名字顯示
                const randomIndex = Math.floor(Math.random() * names.length);
                winnerName.innerText = names[randomIndex];
                
                count++;
                
                // 滾動次數到達後停止
                if (count > 20) {
                    clearInterval(timer);
                    winnerName.classList.remove('rolling');
                    drawBtn.disabled = false;
                    resultTitle.innerText = "🎉 恭喜中獎者";
                    
                    // 最終抽出的結果
                    const finalWinner = names[Math.floor(Math.random() * names.length)];
                    winnerName.innerText = finalWinner;
                }
            }, 60); // 每 60 毫秒跳動一次
        });
    </script>
</body>
</html>
