<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114 Web Labs</title>
    <style>
        /* 這裡是 CSS：負責調整網站的外觀 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif; /* 設定字體 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* 讓內容垂直居中 */
            margin: 0;
            background-color: #f0f2f5; /* 背景顏色 */
        }

        h1 {
            color: #1a73e8; /* 標題顏色 */
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #5f6368;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .nav-container {
            display: flex;
            gap: 20px; /* 按鈕之間的間距 */
        }

        .nav-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: white;
            background-color: #34a853; /* 按鈕顏色 */
            text-decoration: none; /* 去掉超連結底線 */
            border-radius: 8px; /* 圓角 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 當滑鼠移到按鈕上時的效果 */
        .nav-button:hover {
            background-color: #2d8e47;
            transform: translateY(-3px); /* 輕微往上浮動 */
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* 適合手機瀏覽的調整 */
        @media (max-width: 600px) {
            .nav-container {
                flex-direction: column;
                width: 80%;
            }
            .nav-button {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- 網站標題 -->
    <h1>114 Web Labs</h1>
    <p class="subtitle">歡迎來到網頁開發實驗室</p>

    <!-- 導覽連結區塊 -->
    <div class="nav-container">
        <!-- 注意：這裡的路徑改為指向資料夾裡的 index.html -->
        <a href="lab1/index.html" class="nav-button">進入 Lab 1</a>
        <a href="lab2/index.html" class="nav-button">進入 Lab 2</a>
        <a href="lab3/index.html" class="nav-button">進入 Lab 3</a>
    </div>

</body>
</html>
